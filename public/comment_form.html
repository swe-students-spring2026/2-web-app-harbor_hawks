<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Link</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <h1 class="header">Edit Comment</h1>

  <form method="post" action="/c/{{ comment._id }}/edit">
    <div class="form-group">
      <input name="body" required value="{{ comment.body }}">
    </div>
    <button class="submit" type="submit">Save</button>
  </form>

  <a href="/t/{{ comment.thread_id }}"><button class="logo-btn" type="button">Cancel</button></a>

</body>
</html>
